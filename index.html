<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이온 상품 관리</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* 🔒 [개선] 패스워드 화면 최적화 스타일 */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #2f3542; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: 'Malgun Gothic', sans-serif; }
        .auth-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; color: #333; width: 360px; }
        .auth-box h3 { margin-top: 0; color: #2f3542; font-size: 18px; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; margin-bottom: 15px; text-align: center; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #4a6fa5; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-btn:hover { background: #3b5984; }

        /* 기본 레이아웃 디자인 시스템 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f1f2f6; color: #2f3542; min-width: 1300px; }
        h2 { border-left: 5px solid #4a6fa5; padding-left: 10px; color: #2f3542; margin-bottom: 15px; font-size: 22px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #4a6fa5; padding-bottom: 0; }
        .tab-btn { padding: 10px 25px; background: #ced4da; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: bold; color: #57606f; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { background: #4a6fa5; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }

        /* 상단 툴바 조합 */
        .toolbar { display: flex; gap: 10px; align-items: center; background: #e4e7eb; padding: 12px; border-radius: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
        
        /* 🔍 [개선] 단발성 전용 검색창 구조 */
        .search-container { display: flex; gap: 6px; align-items: center; }
        .search-input { padding: 8px 12px; border: 1px solid #95a5a6; border-radius: 4px; width: 280px; font-size: 13px; outline: none; }
        .search-btn { padding: 8px 16px; background: #4a6fa5; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .search-btn:hover { background: #3b5984; }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-blue { background: #4a6fa5; color: white; } .btn-blue:hover { background: #3b5984; }
        .btn-green { background: #2ed573; color: white; } .btn-green:hover { background: #26af5f; }
        .btn-red { background: #ff4757; color: white; } .btn-red:hover { background: #e03e4d; }
        .btn-gray { background: #747d8c; color: white; } .btn-gray:hover { background: #57606f; }

        /* 메인 워크스페이스 구조 (사이드바 유지) */
        .main-container { display: flex; gap: 20px; margin-top: 15px; }
        .sidebar { width: 220px; min-width: 220px; background: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; padding: 12px; max-height: 750px; overflow-y: auto; }
        .sidebar h4 { margin-top: 0; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #747d8c; font-size: 14px; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.1s; color: #57606f; }
        .sidebar li:hover { background: #e4e7eb; color: #2f3542; }
        .sidebar li.active { background: #4a6fa5; color: white; font-weight: bold; }
        .table-wrap { flex: 1; overflow-x: auto; border: 1px solid #ced4da; border-radius: 6px; background: white; max-height: 750px; overflow-y: auto; }

        /* 테이블 공통 디자인 표준 */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; table-layout: fixed; }
        th { background: #f1f2f6; color: #2f3542; padding: 10px; font-weight: bold; border-bottom: 2px solid #ced4da; position: sticky; top: 0; z-index: 10; }
        td { padding: 6px 8px; border-bottom: 1px solid #e4e7eb; vertical-align: middle; word-break: break-all; height: 38px; }
        tr:hover { background-color: #f8f9fa; }

        /* 인라인 에디터 및 커스텀 컬럼 */
        .edit-input { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #4a6fa5; border-radius: 4px; font-size: 13px; font-family: inherit; }
        .status-select { padding: 4px; border-radius: 4px; border: 1px solid #ced4da; font-weight: bold; font-size: 12px; }
        .status-공급중 { color: #2ed573; } .status-일시품절 { color: #ffa502; } .status-단종 { color: #ff4757; }
        .link-naver { color: #1abc9c; font-weight: bold; text-decoration: none; cursor: pointer; } .link-naver:hover { text-decoration: underline; }
        .cell-center { text-align: center; } .cell-right { text-align: right; }

        /* 거래처 공통 와이어프레임 */
        .company-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .company-card { background: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; padding: 15px; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        .company-card:hover { border-color: #4a6fa5; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .company-card h4 { margin: 0 0 8px 0; font-size: 16px; color: #4a6fa5; border-bottom: 1px solid #ced4da; padding-bottom: 6px; }
        .company-card p { margin: 4px 0; font-size: 12px; color: #57606f; }
        .company-card .count-tag { display: inline-block; background: #747d8c; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-left: 5px; }

        /* 메모장(노트) 와이어프레임 */
        .note-layout { display: flex; gap: 20px; }
        .note-sidebar { width: 250px; background: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; padding: 12px; max-height: 700px; overflow-y: auto; }
        .note-sidebar li { padding: 10px; border-bottom: 1px solid #e4e7eb; cursor: pointer; font-size: 13px; }
        .note-sidebar li:hover { background: #e4e7eb; }
        .note-sidebar li.active { background: #747d8c; color: white; font-weight: bold; }
        .note-main { flex: 1; border: 1px solid #ced4da; border-radius: 6px; padding: 20px; background: white; }
        .note-input-wrap { display: flex; gap: 8px; margin-bottom: 15px; }
        .note-input-wrap input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; }
        .note-list-container { display: flex; flex-direction: column; gap: 8px; max-height: 550px; overflow-y: auto; }
        .note-item { display: flex; justify-content: space-between; align-items: center; background: #f1f2f6; padding: 12px; border-radius: 4px; font-size: 13px; }
        .note-item-btns { display: flex; gap: 4px; }

        /* 📥 [신규 추가] 상품 개별 등록 팝업창(모달) CSS 디자인 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background: white; padding: 25px; border-radius: 8px; width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); border: 1px solid #ced4da; }
        .modal-box h3 { margin-top: 0; margin-bottom: 15px; color: #4a6fa5; border-bottom: 2px solid #4a6fa5; padding-bottom: 8px; font-size: 18px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .modal-group { display: flex; flex-direction: column; }
        .modal-group.full { grid-column: span 2; }
        .modal-group label { font-size: 11px; font-weight: bold; color: #57606f; margin-bottom: 4px; }
        .modal-group input, .modal-group select { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; outline: none; }
        .modal-group input:focus { border-color: #4a6fa5; }
        .modal-foot { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #e4e7eb; padding-top: 12px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h3>아이온 상품관리 시스템 접속</h3>
            <input type="password" id="authPassword" class="auth-input" placeholder="마스터 보안코드 입력">
            <button id="authSubmitBtn" class="auth-btn">🔓 안전 시스템 접속</button>
        </div>
    </div>

    <h2>아이온 상품 관리 마스터 시스템</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-products', this)">📦 전체 상품 관리</button>
        <button class="tab-btn" onclick="switchTab('tab-companies', this)">🏢 거래처 관리 맵</button>
        <button class="tab-btn" onclick="switchTab('tab-notes', this)">📝 거래처별 히스토리 메모</button>
    </div>

    <div id="tab-products" class="tab-content active">
        <div class="toolbar">
            <div class="search-container">
                <input type="text" id="productSearchInput" class="search-input" placeholder="검색어 입력 후 엔터 또는 검색 버튼 클릭">
                <button id="productSearchBtn" class="search-btn">🔍 검색</button>
            </div>
            
            <button class="btn btn-gray" onclick="clearFilter()" style="margin-left: 5px;">🔄 필터 전체 초기화</button>
            
            <div class="toolbar-right">
                <button class="btn btn-blue" onclick="openProductModal()">➕ 개별 상품 등록</button>
                <button class="btn btn-green" onclick="triggerExcelUpload()">📤 대량 엑셀 업로드</button>
                <input type="file" id="excelFileId" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelFile(this)">
                <button class="btn btn-red" onclick="clearAllDataFromServer()">⚠️ 전체 데이터 포맷</button>
            </div>
        </div>

        <div class="main-container">
            <aside class="sidebar">
                <h4>🏢 브랜드 목록</h4>
                <ul id="brandFilterList">
                    <li class="active" onclick="filterByBrand('', this)">전체보기 (-)</li>
                </ul>
            </aside>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;" class="cell-center">삭제</th>
                            <th style="width: 100px;">브랜드 (더블클릭 변경)</th>
                            <th style="width: 110px;">제조사</th>
                            <th style="width: 110px;">사방넷코드</th>
                            <th style="width: 90px;" class="cell-center">공급상태</th>
                            <th style="width: 120px;">모델명</th>
                            <th style="width: 280px;">상품명 (클릭 시 네이버쇼핑 검색)</th>
                            <th style="width: 85px;" class="cell-right">공급가</th>
                            <th style="width: 95px;" class="cell-right">온라인판매가</th>
                            <th style="width: 95px;" class="cell-right">폐쇄몰판매가</th>
                            <th style="width: 95px;" class="cell-right">소비자가</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr><td colspan="11" class="cell-center" style="padding:40px; font-weight:bold; color:#4a6fa5;">보안코드를 승인받으면 실시간 데이터베이스 연동이 개시됩니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-companies" class="tab-content">
        <div class="toolbar">
            <span style="font-size:13px; font-weight:bold; color:#57606f;">💡 거래처 카드를 클릭하시면 해당 공급처의 상품들만 요약 조회됩니다.</span>
        </div>
        <div class="company-card-grid" id="companyGridBody"></div>
    </div>

    <div id="tab-notes" class="tab-content">
        <div class="note-layout">
            <div class="note-sidebar" id="noteCompanyList"></div>
            <div class="note-main">
                <h3 id="activeNoteTitle" style="margin-top:0; margin-bottom:15px; color:#2f3542; font-size:16px;">거래처를 선택하세요</h3>
                <div class="note-input-wrap">
                    <input type="text" id="noteInputId" placeholder="중요 통화 내용, 마진 협의 사항 등 기록..." onkeydown="if(event.key==='Enter')saveNoteItem()">
                    <button class="btn btn-blue" onclick="saveNoteItem()">💾 메모 기록</button>
                </div>
                <div class="note-list-container" id="noteListContainerId"></div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modalTitleId">📦 새 상품 등록 폼</h3>
            <form id="modalForm" onsubmit="submitProductModal(event)">
                <div class="modal-grid">
                    <div class="modal-group">
                        <label>브랜드명 *</label>
                        <input type="text" id="mBrand" required placeholder="예: 아이온">
                    </div>
                    <div class="modal-group">
                        <label>제조사(공급처) *</label>
                        <input type="text" id="mCompany" required placeholder="예: 무신사">
                    </div>
                    <div class="modal-group">
                        <label>사방넷 코드</label>
                        <input type="text" id="mSabang" placeholder="코드번호">
                    </div>
                    <div class="modal-group">
                        <label>공급 상태</label>
                        <select id="mStatus">
                          <option value="공급중">공급중</option>
                          <option value="일시품절">일시품절</option>
                          <option value="단종">단종</option>
                        </select>
                    </div>
                    <div class="modal-group">
                        <label>모델명</label>
                        <input type="text" id="mModel" placeholder="모델명 입력">
                    </div>
                    <div class="modal-group">
                        <label>공급가(원)</label>
                        <input type="number" id="mCost" value="0" min="0">
                    </div>
                    <div class="modal-group">
                        <label>온라인판매가(원)</label>
                        <input type="number" id="mSell" value="0" min="0">
                    </div>
                    <div class="modal-group">
                        <label>폐쇄몰판매가(원)</label>
                        <input type="number" id="mClosed" value="0" min="0">
                    </div>
                    <div class="modal-group">
                        <label>소비자가(원)</label>
                        <input type="number" id="mConsumer" value="0" min="0">
                    </div>
                    <div class="modal-group full">
                        <label>상품명 (풀네임 명칭) *</label>
                        <input type="text" id="mName" required placeholder="노출용 마스터 상품 이름">
                    </div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn btn-gray" onclick="closeProductModal()">❌ 취소</button>
                    <button type="submit" class="btn btn-blue">💾 안전 저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 구글 배포 주소 연동
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzI2FuckiGQ-NGlRdt6zunsLYli0fVHTyxft8Isimoa3byMFfRSyW4blSjbjKd3jxfa/exec";
        const SYSTEM_SECURE_PW = "2369"; // 마스터 암호

        let products = [];
        let ActiveFilterBrand = "";
        let ActiveFilterCompany = "";
        let ActiveNoteTargetCompany = "";

        // ==========================================
        // 🔒 [개선] 1. 암호 접속 제어 연동 (렉 완전 해결)
        // ==========================================
        document.getElementById('authPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { verifyPassword(); }
        });
        document.getElementById('authSubmitBtn').addEventListener('click', verifyPassword);

        function verifyPassword() {
            const inputPw = document.getElementById('authPassword').value;
            if (inputPw === SYSTEM_SECURE_PW) {
                document.getElementById('authOverlay').style.display = 'none';
                loadDatabase();
            } else {
                alert("보안 인가 패스워드가 다릅니다.");
                document.getElementById('authPassword').value = '';
                document.getElementById('authPassword').focus();
            }
        }

        // ==========================================
        // 🔍 [개선] 2. 검색창 제어 연동 (단발성 클릭/엔터로 소멸)
        // ==========================================
        document.getElementById('productSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { runMainFilter(); }
        });
        document.getElementById('productSearchBtn').addEventListener('click', runMainFilter);

        function runMainFilter() {
            const query = document.getElementById('productSearchInput').value.trim().toLowerCase();
            
            let result = products.filter(p => {
                if (p.productName === "거래처 메모 기록용") return false; // 메모장 로우 격리보호
                
                // 브랜드 필터
                if (ActiveFilterBrand && p.brand !== ActiveFilterBrand) return false;
                // 거래처 카드 필터
                if (ActiveFilterCompany && p.company !== ActiveFilterCompany) return false;
                
                // 검색 단어 단발성 대조 연산
                if (query) {
                    const match = (p.brand + p.company + p.sabangCode + p.modelName + p.productName).toLowerCase();
                    if (!match.includes(query)) return false;
                }
                return true;
            });
            
            renderProductTable(result);
        }

        // ==========================================
        // 📥 [개선] 3. 개별 등록 전용 팝업 모달창 제어 로직
        // ==========================================
        function openProductModal() {
            document.getElementById('modalForm').reset();
            document.getElementById('productModal').style.display = 'flex';
        }
        function closeProductModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        function submitProductModal(e) {
            e.preventDefault();
            
            const pData = {
                brand: document.getElementById('mBrand').value.trim(),
                company: document.getElementById('mCompany').value.trim(),
                sabangCode: document.getElementById('mSabang').value.trim() || "-",
                status: document.getElementById('mStatus').value,
                modelName: document.getElementById('mModel').value.trim() || "공통",
                productName: document.getElementById('mName').value.trim(),
                costPrice: Number(document.getElementById('mCost').value || 0),
                sellPrice: Number(document.getElementById('mSell').value || 0),
                closedPrice: Number(document.getElementById('mClosed').value || 0),
                consumerPrice: Number(document.getElementById('mConsumer').value || 0),
                note: "-",
                productLink: "-"
            };

            const tempId = "temp_" + Date.now();
            const localItem = Object.assign({ id: tempId }, pData);
            
            // 리스트에 즉시 반영 (낙관적 렌더링)
            products.unshift(localItem);
            closeProductModal();
            refreshAllViews();

            // 백엔드 시트로 전송 처리
            sendDataToSheets({ action: "add", product: pData }, (res) => {
                if (res && res.id) {
                    const idx = products.findIndex(item => String(item.id) === String(tempId));
                    if (idx !== -1) products[idx].id = res.id; // 리턴받은 고유 ID 치환 고정
                }
            });
        }

        // ==========================================
        // 📊 코어 엔진 - 데이터 허브 파트 (기존 기능 100% 보존)
        // ==========================================
        function loadDatabase() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = `<tr><td colspan="11" class="cell-center" style="padding:40px; font-weight:bold; color:#4a6fa5;">🔄 구글 메인 프레임워크 실시간 동기화 중...</td></tr>`;
            
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(res => {
                    if (res.result === "success") {
                        products = res.data || [];
                        refreshAllViews();
                    } else { alert("서버 통신 장애: " + res.message); }
                })
                .catch(err => alert("네트워크 오류 발생 (배포 또는 주소 미싱): " + err));
        }

        function refreshAllViews() {
            runMainFilter();
            refreshSidebarBrands();
            refreshCompanyGrid();
            refreshNoteSidebar();
            refreshNoteList();
        }

        function renderProductTable(targetList) {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = "";
            if (targetList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="cell-center" style="padding:30px; color:#747d8c;">일치하는 관리 대상 품목이 없습니다.</td></tr>`;
                return;
            }

            targetList.forEach(p => {
                const tr = document.createElement('tr');
                const nUrl = `https://search.shopping.naver.com/search/all?query=${encodeURIComponent(p.productName)}`;
                
                tr.innerHTML = `
                    <td class="cell-center"><button class="btn btn-red" style="padding:2px 6px; font-size:11px;" onclick="deleteRowDirectly('${p.id}')">❌</button></td>
                    <td ondblclick="makeCellEditable(this,'brand','${p.id}')">${p.brand}</td>
                    <td ondblclick="makeCellEditable(this,'company','${p.id}')">${p.company}</td>
                    <td ondblclick="makeCellEditable(this,'sabangCode','${p.id}')">${p.sabangCode}</td>
                    <td class="cell-center">
                        <select class="status-select status-${p.status}" onchange="updateCellStatus('${p.id}', this)">
                            <option value="공급중" ${p.status==='공급중'?'selected':''}>공급중</option>
                            <option value="일시품절" ${p.status==='일시품절'?'selected':''}>일시품절</option>
                            <option value="단종" ${p.status==='단종'?'selected':''}>단종</option>
                        </select>
                    </td>
                    <td ondblclick="makeCellEditable(this,'modelName','${p.id}')">${p.modelName}</td>
                    <td><span class="link-naver" onclick="window.open('${nUrl}','_blank')">${p.productName}</span></td>
                    <td class="cell-right" ondblclick="makeCellEditable(this,'costPrice','${p.id}',true)">${Number(p.costPrice).toLocaleString()}원</td>
                    <td class="cell-right" ondblclick="makeCellEditable(this,'sellPrice','${p.id}',true)" style="font-weight:bold; color:#4a6fa5;">${Number(p.sellPrice).toLocaleString()}원</td>
                    <td class="cell-right" ondblclick="makeCellEditable(this,'closedPrice','${p.id}',true)" style="font-weight:bold; color:#7c3aed;">${Number(p.closedPrice).toLocaleString()}원</td>
                    <td class="cell-right" ondblclick="makeCellEditable(this,'consumerPrice','${p.id}',true)">${Number(p.consumerPrice).toLocaleString()}원</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 인라인 편집기 제어
        function makeCellEditable(cell, field, id, isNum=false) {
            if (cell.querySelector('input')) return;
            const originalVal = cell.innerText.replace(/[원,]/g, "");
            const input = document.createElement('input');
            input.type = isNum ? "number" : "text";
            input.className = "edit-input";
            input.value = originalVal;
            
            cell.innerHTML = "";
            cell.appendChild(input);
            input.focus();

            const finishEdit = () => {
                let finalVal = input.value.trim();
                if (isNum) finalVal = Number(finalVal || 0);
                cell.innerHTML = isNum ? finalVal.toLocaleString() + "원" : finalVal;
                
                const idx = products.findIndex(p => String(p.id) === String(id));
                if (idx !== -1) products[idx][field] = finalVal;
                
                sendDataToSheets({ action: "update", id: id, field: field, value: finalVal });
                if (field === "brand") refreshSidebarBrands();
                if (field === "company") refreshCompanyGrid();
            };

            input.onblur = finishEdit;
            input.onkeydown = (e) => { if(e.key === 'Enter') input.blur(); };
        }

        function updateCellStatus(id, select) {
            const val = select.value;
            select.className = `status-select status-${val}`;
            const idx = products.findIndex(p => String(p.id) === String(id));
            if (idx !== -1) products[idx].status = val;
            sendDataToSheets({ action: "update", id: id, field: "status", value: val });
        }

        function deleteRowDirectly(id) {
            if (!confirm("해당 품목을 영구 삭제하시겠습니까?")) return;
            products = products.filter(p => String(p.id) !== String(id));
            refreshAllViews();
            sendDataToSheets({ action: "delete", id: id });
        }

        // 사이드바 사이드 연산
        function refreshSidebarBrands() {
            const list = document.getElementById('brandFilterList');
            list.innerHTML = `<li class="${ActiveFilterBrand===''?'active':''}" onclick="filterByBrand('', this)">전체보기 (-)</li>`;
            
            const bMap = {};
            products.forEach(p => { if(p.brand && p.productName !== "거래처 메모 기록용") bMap[p.brand] = (bMap[p.brand] || 0) + 1; });
            
            Object.keys(bMap).sort().forEach(b => {
                const li = document.createElement('li');
                li.className = ActiveFilterBrand === b ? "active" : "";
                li.innerText = `${b} (${bMap[b]})`;
                li.onclick = () => filterByBrand(b, li);
                list.appendChild(li);
            });
        }

        function filterByBrand(b, li) {
            ActiveFilterBrand = b;
            document.querySelectorAll('#brandFilterList li').forEach(item => item.classList.remove('active'));
            li.classList.add('active');
            runMainFilter();
        }

        function clearFilter() {
            ActiveFilterBrand = ""; ActiveFilterCompany = "";
            document.getElementById('productSearchInput').value = "";
            refreshAllViews();
        }

        // [탭2] 거래처 빌드
        function refreshCompanyGrid() {
            const grid = document.getElementById('companyGridBody');
            grid.innerHTML = "";
            
            const cMap = {};
            products.forEach(p => {
                if(!p.company) return;
                if(!cMap[p.company]) cMap[p.company] = { total: 0, active: 0, soldout: 0, stop: 0 };
                if (p.productName !== "거래처 메모 기록용") {
                    cMap[p.company].total++;
                    if (p.status === "공급중") cMap[p.company].active++;
                    else if (p.status === "일시품절") cMap[p.company].soldout++;
                    else if (p.status === "단종") cMap[p.company].stop++;
                }
            });

            Object.keys(cMap).sort().forEach(c => {
                const info = cMap[c];
                const card = document.createElement('div');
                card.className = "company-card";
                if(ActiveFilterCompany === c) card.style.borderColor = "#4a6fa5";
                
                card.innerHTML = `
                    <h4>🏢 ${c} <span class="count-tag">총 ${info.total}개</span></h4>
                    <p>🟢 공급 진행 상품: <strong style="color:#2ed573;">${info.active}</strong>개</p>
                    <p>🟡 품절 대기 상품: <strong style="color:#ffa502;">${info.soldout}</strong>개</p>
                    <p>🔴 공급 중단 단종: <strong style="color:#ff4757;">${info.stop}</strong>개</p>
                `;
                card.onclick = () => {
                    ActiveFilterCompany = c;
                    switchTab('tab-products', document.querySelector('.tabs button'));
                    runMainFilter();
                };
                grid.appendChild(card);
            });
        }

        // [탭3] 메모장 빌드
        function refreshNoteSidebar() {
            const sb = document.getElementById('noteCompanyList');
            sb.innerHTML = "<h4>🏢 공급처 목록</h4>";
            const set = new Set();
            products.forEach(p => { if(p.company) set.add(p.company); });
            
            const ul = document.createElement('ul');
            Array.from(set).sort().forEach(c => {
                const li = document.createElement('li');
                if(ActiveNoteTargetCompany === c) li.className = "active";
                li.innerText = "🏢 " + c;
                li.onclick = () => {
                    ActiveNoteTargetCompany = c;
                    refreshNoteSidebar();
                    refreshNoteList();
                };
                ul.appendChild(li);
            });
            sb.appendChild(ul);
        }

        function refreshNoteList() {
            const container = document.getElementById('noteListContainerId');
            const title = document.getElementById('activeNoteTitle');
            container.innerHTML = "";
            
            if (!ActiveNoteTargetCompany) {
                title.innerText = "❌ 선택된 거래처가 없습니다."; return;
            }
            title.innerText = `🏢 [${ActiveNoteTargetCompany}] 비즈니스 거래 히스토리 기록집`;
            
            const matched = products.filter(p => p.company === ActiveNoteTargetCompany && p.productName === "거래처 메모 기록용");
            if(matched.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:#747d8c;padding:20px;">협의 내역이나 주요 공지 사항 등 기록된 메모가 없습니다.</div>`;
                return;
            }

            matched.forEach(n => {
                const div = document.createElement('div');
                div.className = "note-item";
                div.innerHTML = `
                    <span class="content-span" style="font-weight:500;">${n.note}</span>
                    <div class="note-item-btns">
                        <button class="btn btn-blue" style="padding:2px 8px;font-size:11px;" onclick="editNoteDirectly('${n.id}',this)">✏️</button>
                        <button class="btn btn-red" style="padding:2px 8px;font-size:11px;" onclick="deleteNoteDirectly('${n.id}')">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function saveNoteItem() {
            const input = document.getElementById('noteInputId');
            const c = input.value.trim(); if(!c) return;
            const tempNoteId = "temp_" + Date.now();
            
            const item = {
                id: tempNoteId, brand: "-", company: ActiveNoteTargetCompany, sabangCode: "-", status: "공급중",
                modelName: "공통", productName: "거래처 메모 기록용", costPrice: 0, sellPrice: 0, closedPrice: 0, consumerPrice: 0,
                note: c, productLink: "-"
            };
            
            products.unshift(item);
            input.value = '';
            refreshNoteList();

            sendDataToSheets({ action: "add", product: item }, (res) => {
                if (res && res.id) {
                    const idx = products.findIndex(p => String(p.id) === String(tempNoteId));
                    if (idx !== -1) products[idx].id = res.id;
                    refreshNoteList();
                }
            });
        }

        function editNoteDirectly(id, btn) {
            const span = btn.closest('.note-item').querySelector('.content-span');
            const oldT = span.innerText;
            const newT = prompt("수정할 메모 내용을 작성하세요:", oldT);
            if (!newT || newT.trim() === '') return;
            
            span.innerText = newT.trim();
            const idx = products.findIndex(p => String(p.id) === String(id));
            if (idx !== -1) products[idx].note = newT.trim();
            sendDataToSheets({ action: "update", id: id, field: "note", value: newT.trim() });
        }

        function deleteNoteDirectly(id) {
            if (!confirm("선택한 메모 이력을 영구 삭제합니까?")) return;
            products = products.filter(p => String(p.id) !== String(id));
            refreshNoteList();
            sendDataToSheets({ action: "delete", id: id });
        }

        // 📤 엑셀 대량 파일 업로드 처리 파트 (기존 기능 유지)
        function triggerExcelUpload() { document.getElementById('excelFileId').click(); }
        function handleExcelFile(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const sheetData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                const excelRows = sheetData.slice(1).filter(r => r && r[0]);
                if (excelRows.length === 0) { alert("업로드할 유효 데이터가 행에 없습니다."); return; }
                
                if (!confirm(`총 ${excelRows.length}개의 품목 데이터를 일괄 업로드 합니까?`)) return;
                
                excelRows.forEach((r, i) => {
                    products.unshift({
                        id: "temp_excel_" + (Date.now() + i),
                        brand: r[0]||"-", company: r[1]||"-", sabangCode: r[2]||"-", status: r[3]||"공급중",
                        modelName: r[4]||"공통", productName: r[5]||"미정",
                        costPrice: Number(r[6]||0), sellPrice: Number(r[7]||0), closedPrice: Number(r[8]||0), consumerPrice: Number(r[9]||0),
                        note: r[10]||"-", productLink: r[11]||"-"
                    });
                });
                refreshAllViews();
                sendDataToSheets({ action: "uploadRows", rows: excelRows }, () => { loadDatabase(); });
            };
            reader.readAsArrayBuffer(file);
            input.value = "";
        }

        function clearAllDataFromServer() {
            if(!confirm("⚠️ 경고: 모든 데이터가 소멸됩니다. 포맷합니까?")) return;
            products = []; refreshAllViews();
            sendDataToSheets({ action: "clear" });
        }

        // 공통 백엔드 데이터 전송 파트 (MimeType 텍스트 우회로 CORS 원천 보호)
        function sendDataToSheets(data, callback=null) {
            fetch(SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => { if(callback) callback(res); })
            .catch(err => console.error("비동기 동기화 딜레이 감지됨: ", err));
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
